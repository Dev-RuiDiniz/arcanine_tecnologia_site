name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Quality checks
        run: npm run quality

      - name: Responsive validation
        run: npm run responsive:validate

      - name: Build
        run: npm run build:ci
