name: Vercel Deploy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  preview:
    if: ${{ github.event_name == 'pull_request' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (preview)
        run: npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build prebuilt artifacts
        run: npx vercel build --token=$VERCEL_TOKEN

      - name: Deploy preview
        run: npx vercel deploy --prebuilt --token=$VERCEL_TOKEN

  production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (production)
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build prebuilt artifacts
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
